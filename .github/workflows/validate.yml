name: Validate GDPO

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install -r validation/requirements.txt

      - name: Run GDPO validation checks
        run: python validation/validate_gdpo.py

      - name: Run manuscript supplement checks
        run: python supplement/manuscript-validation/run_validation.py
